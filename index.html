<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Coração 💗</title>

<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}
canvas{
display:block;
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<audio id="music" autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0e6e.mp3?filename=romantic-piano-ambient-110997.mp3" type="audio/mpeg">
</audio>

<script>
let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let t=0,scale=18,grow=true;

function heart(a){
return{
x:16*Math.pow(Math.sin(a),3),
y:13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a)
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#ff69b4";
ctx.font="14px monospace";

for(let i=0;i<200;i++){
let ang=i*0.1+t;
let p=heart(ang);
ctx.fillText("I love you",
canvas.width/2+p.x*scale,
canvas.height/2-p.y*scale);
}

scale+=grow?0.1:-0.1;
if(scale>22||scale<18)grow=!grow;
t+=0.02;
requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
