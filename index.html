<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Coração 💗 Iris</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
}

button {
    position: absolute;
    z-index: 2;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 15px 30px;
    font-size: 16px;
    background: pink;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

canvas {
    display: block;
}

/* vídeo pequeno no canto */
.video-container {
    position: fixed;
    bottom: 10px;
    right: 10px;
    width: 150px;
    height: 84px;
    display: none;
}
</style>
</head>
<body>

<button onclick="startLove()">Clique 💗</button>

<canvas id="canvas"></canvas>

<div class="video-container" id="videoBox">
<iframe 
width="150" 
height="84"
src=""
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.fillStyle = "#ff69b4";
ctx.font = "14px monospace";

let t = 0;
let scale = 18;
let growing = true;

function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t)
          - 5 * Math.cos(2 * t)
          - 2 * Math.cos(3 * t)
          - Math.cos(4 * t);
    return { x, y };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < 200; i++) {
        let angle = i * 0.1 + t;
        let pos = heart(angle);

        let x = canvas.width/2 + pos.x * scale;
        let y = canvas.height/2 - pos.y * scale;

        ctx.fillText("I love you", x, y);
    }

    if (growing) {
        scale += 0.1;
        if (scale > 22) growing = false;
    } else {
        scale -= 0.1;
        if (scale < 18) growing = true;
    }

    t += 0.02;
    requestAnimationFrame(draw);
}

function startLove() {
    document.querySelector("button").style.display = "none";

    const iframe = document.querySelector("iframe");
    iframe.src = "https://www.youtube.com/embed/NdYWuo9OFAw?autoplay=1";

    document.getElementById("videoBox").style.display = "block";

    draw();
}
</script>

</body>
</html>
