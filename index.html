<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Coração Animado 💗</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    flex-direction: column;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

button {
    position: relative;
    z-index: 2;
    padding: 12px 25px;
    font-size: 16px;
    background: pink;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}
</style>
</head>
<body>

<button onclick="startLove()">Clique para sentir 💗</button>

<canvas id="canvas"></canvas>

<audio id="music" loop>
    <!-- Troque pelo nome da sua música -->
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.fillStyle = "pink";
ctx.font = "14px monospace";

let t = 0;
let scale = 18;
let growing = true;

function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t)
          - 5 * Math.cos(2 * t)
          - 2 * Math.cos(3 * t)
          - Math.cos(4 * t);
    return { x, y };
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < 200; i++) {
        let angle = i * 0.1 + t;
        let pos = heart(angle);

        let x = canvas.width/2 + pos.x * scale;
        let y = canvas.height/2 - pos.y * scale;

        ctx.fillText("I love you", x, y);
    }

    // efeito pulsar
    if (growing) {
        scale += 0.1;
        if (scale > 22) growing = false;
    } else {
        scale -= 0.1;
        if (scale < 18) growing = true;
    }

    t += 0.02;
    requestAnimationFrame(draw);
}

function startLove() {
    document.querySelector("button").style.display = "none";
    document.getElementById("music").play();
    draw();
}
</script>

</body>
</html>
