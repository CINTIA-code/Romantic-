<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Iris 💗</title>
<style>
body{
margin:0;
background:black;
overflow:hidden;
font-family:monospace;
}
button{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 25px;
background:pink;
border:none;
border-radius:20px;
}
canvas{
display:block;
}
.video{
position:fixed;
bottom:10px;
right:10px;
display:none;
}
</style>
</head>
<body>

<button onclick="startLove()">Clique 💗</button>
<canvas id="c"></canvas>

<div class="video" id="video">
<iframe width="200" height="120"
src=""
frameborder="0"
allow="autoplay"
allowfullscreen></iframe>
</div>

<script>
let canvas=document.getElementById("c");
let ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let t=0,scale=18,grow=true;

function heart(a){
return{
x:16*Math.pow(Math.sin(a),3),
y:13*Math.cos(a)-5*Math.cos(2*a)-2*Math.cos(3*a)-Math.cos(4*a)
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
for(let i=0;i<200;i++){
let ang=i*0.1+t;
let p=heart(ang);
ctx.fillStyle="#ff69b4";
ctx.fillText("I love you",
canvas.width/2+p.x*scale,
canvas.height/2-p.y*scale);
}
scale+=grow?0.1:-0.1;
if(scale>22||scale<18)grow=!grow;
t+=0.02;
requestAnimationFrame(draw);
}

function startLove(){
document.querySelector("button").style.display="none";
document.querySelector("iframe").src=
"https://www.youtube.com/embed/NdYWuo9OFAw?autoplay=1";
document.getElementById("video").style.display="block";
draw();
}
</script>

</body>
</html>
